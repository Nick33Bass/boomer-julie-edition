<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boomer ou pas Boomer — Julie Edition</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#060611;
color:white;
overflow-x:hidden;
background-image:
linear-gradient(rgba(255,0,128,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,0,128,.08) 1px, transparent 1px);
background-size:40px 40px;
}

.container{
max-width:720px;
margin:auto;
padding:20px;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.card{
width:100%;
background:rgba(0,0,0,.82);
border:2px solid #ff00aa;
border-radius:28px;
padding:30px;
box-shadow:0 0 35px rgba(255,0,170,.45);
backdrop-filter:blur(10px);
}

.title{
font-family:'Orbitron',sans-serif;
font-size:3rem;
font-weight:900;
text-align:center;
line-height:1.1;
margin-bottom:10px;
text-transform:uppercase;
}

.pink{
color:#ff00aa;
text-shadow:0 0 15px #ff00aa;
}

.blue{
color:#00e5ff;
text-shadow:0 0 15px #00e5ff;
}

.subtitle{
text-align:center;
font-size:1.1rem;
line-height:1.6;
margin:20px 0 30px 0;
}

.julie-photo{
width:150px;
height:150px;
object-fit:cover;
border-radius:50%;
display:block;
margin:0 auto 20px auto;
border:4px solid #ff00aa;
box-shadow:0 0 25px #ff00aa;
}

.julie-edition{
text-align:center;
font-size:2rem;
font-style:italic;
color:#ff77c8;
margin-bottom:15px;
font-weight:700;
}

.progress{
height:12px;
background:#222;
border-radius:20px;
overflow:hidden;
margin-bottom:25px;
}

.progress-bar{
height:100%;
width:0%;
background:linear-gradient(90deg,#ff00aa,#00e5ff);
transition:.3s;
}

.question-number{
font-family:'Orbitron',sans-serif;
color:#00e5ff;
margin-bottom:15px;
}

.question{
font-size:1.45rem;
font-weight:700;
line-height:1.4;
margin-bottom:25px;
}

.btn{
width:100%;
padding:18px;
border:none;
border-radius:15px;
font-size:1rem;
font-weight:700;
cursor:pointer;
transition:.2s;
margin-top:14px;
}

.btn-main{
background:linear-gradient(45deg,#ff00aa,#ff5e00);
color:white;
}

.btn-main:hover{
transform:scale(1.03);
}

.answer{
background:#11131d;
border:2px solid #2a2a35;
color:white;
text-align:left;
}

.answer:hover{
border-color:#00e5ff;
transform:scale(1.02);
}

.letter{
display:inline-flex;
align-items:center;
justify-content:center;
width:36px;
height:36px;
border-radius:10px;
margin-right:15px;
font-weight:700;
}

.a{background:#ff006e;}
.b{background:#ffbe0b;color:black;}
.c{background:#00b4d8;}
.d{background:#8338ec;}

.result-score{
font-family:'Orbitron',sans-serif;
font-size:5rem;
text-align:center;
color:#ff00aa;
margin:10px 0;
}

.result-title{
font-size:2rem;
text-align:center;
font-weight:700;
color:#00e5ff;
margin-bottom:20px;
}

.result-text{
text-align:center;
font-size:1.15rem;
line-height:1.7;
}

.share{
background:#25D366;
color:white;
}

.footer{
text-align:center;
opacity:.7;
margin-top:25px;
font-size:.9rem;
}

.neon{
text-shadow:0 0 10px #ff00aa;
}

@media(max-width:600px){

.title{
font-size:2.2rem;
}

.question{
font-size:1.2rem;
}

.result-score{
font-size:4rem;
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<div id="start">

<img src="julie.jpg" class="julie-photo">

<h1 class="title">
<span class="pink">Boomer</span><br>
ou pas<br>
<span class="blue">Boomer ?</span>
</h1>

<div class="julie-edition">
Julie Edition
</div>

<p class="subtitle">
Le test ultime génération 77-80.<br>
Julie veut savoir si tu es devenu vieux avant l'heure…<br>
ou si ton âme est encore en festival 😄
</p>

<button class="btn btn-main" onclick="startQuiz()">
LANCER LE TEST
</button>

<div class="footer">
32 questions • années 80 • autodérision • zéro filtre
</div>

</div>

<div id="quiz" style="display:none;">

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div class="question-number" id="number"></div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div id="result" style="display:none;">

<img src="julie.jpg" class="julie-photo">

<div class="result-score" id="score"></div>

<div class="result-title" id="title"></div>

<div class="result-text" id="text"></div>

<button class="btn share" onclick="shareResult()">
PARTAGER SUR WHATSAPP
</button>

<button class="btn btn-main" onclick="restartQuiz()">
RECOMMENCER
</button>

</div>

</div>

</div>

<script>

const questions = [

{
q:"Quand tu vois des jeunes danser sur TikTok…",
a:[
["Je me demande s’ils ont un problème neurologique.",4],
["J’essaie de comprendre.",3],
["Je connais déjà la trend.",2],
["J’ai déjà envoyé une vidéo “pour rire”.",1]
]
},

{
q:"Ton rapport aux vocaux WhatsApp :",
a:[
["Écrivez comme tout le monde.",4],
["30 secondes max.",3],
["Ça dépend.",2],
["J’envoie des podcasts.",1]
]
},

{
q:"Quand tu entends le mot after…",
a:[
["À mon âge ? Jamais.",4],
["Pourquoi pas mais pas tard.",3],
["Ça dépend avec qui.",2],
["On finit où ?",1]
]
},

{
q:"Question osée 🌶️ Quand quelqu’un plus jeune te drague :",
a:[
["Flatteur mais suspect.",4],
["Je demande l’âge exact.",3],
["Je joue le jeu.",2],
["J’oublie l’écart d’âge.",1]
]
},

{
q:"Ton samedi idéal :",
a:[
["Dormir tôt.",4],
["Petit resto tranquille.",3],
["Improviser.",2],
["Finir en soirée.",1]
]
},

{
q:"Quand quelqu’un t’écrit à 2h du matin :",
a:[
["Téléphone en mode avion.",4],
["Je vois ça demain.",3],
["Ça dépend qui.",2],
["Je réponds direct.",1]
]
},

{
q:"Festival électro :",
a:[
["Bruit + fatigue.",4],
["Une journée max.",3],
["Pourquoi pas.",2],
["On dort où après ?",1]
]
},

{
q:"Quand tu te lèves du canapé :",
a:[
["Tu fais un bruit étrange.",4],
["Ça craque un peu.",3],
["Ça dépend des jours.",2],
["Toujours athlétique.",1]
]
},

{
q:"Question osée 🌶️ Niveau séduction :",
a:[
["Confort avant spontanéité.",4],
["Connexion émotionnelle.",3],
["Encore joueur(se).",2],
["Dangereusement efficace.",1]
]
},

{
q:"Quand quelqu’un parle IA ou crypto :",
a:[
["Encore une arnaque.",4],
["Je décroche.",3],
["Ça m’intéresse un peu.",2],
["J’ai déjà testé.",1]
]
},

{
q:"Quand la musique est forte au resto :",
a:[
["On peut même plus parler.",4],
["Ça m’agace vite.",3],
["Je fais avec.",2],
["Ça met l’ambiance.",1]
]
},

{
q:"Question osée 🌶️ Une nuit blanche aujourd’hui :",
a:[
["Impossible médicalement.",4],
["Je mets 3 jours à récupérer.",3],
["Ça dépend de la soirée.",2],
["Challenge accepté.",1]
]
}

];

let currentQuestion = 0;
let totalScore = 0;

function startQuiz(){

document.getElementById('start').style.display='none';
document.getElementById('quiz').style.display='block';

showQuestion();

}

function showQuestion(){

const q = questions[currentQuestion];

document.getElementById('number').innerHTML =
`QUESTION ${currentQuestion+1} / ${questions.length}`;

document.getElementById('question').innerHTML = q.q;

document.getElementById('bar').style.width =
((currentQuestion/questions.length)*100)+'%';

const answers = document.getElementById('answers');

answers.innerHTML='';

const letters=['A','B','C','D'];
const classes=['a','b','c','d'];

q.a.forEach((answer,index)=>{

const button=document.createElement('button');

button.className='btn answer';

button.innerHTML=`
<span class="letter ${classes[index]}">
${letters[index]}
</span>
${answer[0]}
`;

button.onclick=()=>selectAnswer(answer[1]);

answers.appendChild(button);

});

}

function selectAnswer(points){

totalScore += points;
currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

showResult();

}

}

function showResult(){

document.getElementById('quiz').style.display='none';
document.getElementById('result').style.display='block';

document.getElementById('score').innerHTML =
totalScore + " pts";

let title="";
let text="";

if(totalScore <= 18){

title="Anti-boomer certifié";

text="Ton dos négocie parfois… mais ton âme reste en after. Julie valide encore ton potentiel festival.";

}else if(totalScore <= 28){

title="Boomer sous contrôle";

text="Tu alternes entre modernité et phrases inquiétantes du style : 'Franchement avant c’était mieux organisé.'";

}else if(totalScore <= 38){

title="Boomer avancé";

text="Tu regardes les horaires du restaurant avant de confirmer une sortie. Julie commence à s’inquiéter.";

}else{

title="Boomérisation critique";

text="Tu râles contre les QR codes, les trottinettes et les mises à jour iPhone. Julie recommande une surveillance rapprochée.";

}

document.getElementById('title').innerHTML = title;
document.getElementById('text').innerHTML = text;

}

function restartQuiz(){

currentQuestion = 0;
totalScore = 0;

document.getElementById('result').style.display='none';
document.getElementById('start').style.display='block';

}

function shareResult(){

const text =
"Je viens de faire le test 'Boomer ou pas Boomer — Julie Edition' 😄";

window.open(
"https://wa.me/?text="+encodeURIComponent(text),
"_blank"
);

}

</script>

</body>
</html>
